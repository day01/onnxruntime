name: Musllinux Build

on:
  pull_request:
    branches: [main, 'rel-*']

jobs:
  build-musllinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev

      - name: Build musllinux wheel
        run: |
          ./build.sh --update --config Release --build --build_wheel --parallel \
            --cmake_extra_defines CMAKE_TOOLCHAIN_FILE=cmake/linux_x86_64_musl_toolchain.cmake

      - uses: actions/upload-artifact@v4
        with:
          name: musllinux-wheel
          path: build/Linux/Release/dist/*.whl
