name: Musllinux Build

on:
  pull_request:
    branches: [main, 'rel-*']

jobs:
  build-musllinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build musllinux Docker image
        run: |
          git clone --depth 1 https://github.com/pypa/manylinux
          docker build -t ort-musllinux \
            --build-arg POLICY=musllinux_1_1 \
            -f manylinux/docker/Dockerfile manylinux

      - name: Build wheel inside container
        run: |
          docker run --rm -v "$PWD:/workspace" ort-musllinux bash -c \
            "cd /workspace && ./build.sh --update --config Release --build --build_wheel --parallel"

      - uses: actions/upload-artifact@v4
        with:
          name: musllinux-wheel
          path: build/Linux/Release/dist/*.whl
